services:
  c2e:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: "${VITE_BASE_PATH:-/}"
        APP_VERSION: "${APP_VERSION:-}"
    image: c2e-practice:latest
    ports:
      - "${C2E_PORT_BIND:-3000:3000}"
    volumes:
      - ./data:/app/data
    environment:
      APP_PASSWORD: "${APP_PASSWORD:?APP_PASSWORD is required}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET is required}"
      SIRI_API_TOKEN: "${SIRI_API_TOKEN:-}"
      TZ: "${TZ:-Asia/Shanghai}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:?DEEPSEEK_BASE_URL is required}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:?DEEPSEEK_MODEL is required}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/c2e.sqlite}"
      AI_TIMEOUT_MS: "${AI_TIMEOUT_MS:-30000}"
      REVIEW_SCORE_THRESHOLD: "${REVIEW_SCORE_THRESHOLD:-80}"
      TTS_PROVIDER: "${TTS_PROVIDER:-}"
      TTS_BASE_URL: "${TTS_BASE_URL:-}"
      TTS_API_KEY: "${TTS_API_KEY:-}"
      TTS_MODEL: "${TTS_MODEL:-}"
      TTS_VOICE: "${TTS_VOICE:-}"
      TTS_FORMAT: "${TTS_FORMAT:-}"
      TTS_APP_ID: "${TTS_APP_ID:-}"
      TTS_ACCESS_TOKEN: "${TTS_ACCESS_TOKEN:-}"
      TTS_CLUSTER: "${TTS_CLUSTER:-}"
      TTS_VOICE_TYPE: "${TTS_VOICE_TYPE:-}"
      TTS_ENCODING: "${TTS_ENCODING:-}"
      TTS_TIMEOUT_MS: "${TTS_TIMEOUT_MS:-30000}"
      WORD_AUDIO_GENERATED_DIR: "${WORD_AUDIO_GENERATED_DIR:-/app/data/word-audio/generated}"
