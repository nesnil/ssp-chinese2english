services:
  c2e:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: "${VITE_BASE_PATH:-/}"
    image: c2e-practice:latest
    ports:
      - "${C2E_PORT_BIND:-3000:3000}"
    volumes:
      - ./data:/app/data
    environment:
      APP_PASSWORD: "${APP_PASSWORD:?APP_PASSWORD is required}"
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET is required}"
      DEEPSEEK_BASE_URL: "${DEEPSEEK_BASE_URL:?DEEPSEEK_BASE_URL is required}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:?DEEPSEEK_MODEL is required}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/c2e.sqlite}"
      AI_TIMEOUT_MS: "${AI_TIMEOUT_MS:-30000}"
      REVIEW_SCORE_THRESHOLD: "${REVIEW_SCORE_THRESHOLD:-80}"
